<section class="tab dd flexcol {{ tab.cssClass }}" data-group="{{ tab.group }}" data-tab="{{ tab.id }}" data-application-part="dd">
    <div class="dd-sheet">
        <header class="dd-hero">
            <div class="dd-hero-title">
                <h2>Darker Dungeons</h2>
            </div>
            <div class="dd-hero-actions">
                <button type="button" class="dd-crafting-launch" data-darksheet-open-crafting data-actor-id="{{actor._id}}">
                    <i class="fas fa-hammer" inert></i>
                    <span>Crafting</span>
                </button>
                <i class="fas fa-skull" inert></i>
            </div>
        </header>

        <div class="darksheet-dd-survival dd-grid">
            {{> "modules/darksheet/templates/inventoryAdditions.html"}}
            {{> "modules/darksheet/templates/fatigue.html"}}
        </div>

        {{#unless hidechecks}}
        <section class="dd-card dd-card--checks part6 {{actor._id}} allparts items-section card">
            <header class="dd-card-header">
                <i class="fas fa-dice-d20" inert></i>
                <h4 class="darksheetheader {{actor._id}} items-header header">Checks</h4>
            </header>
            <div class="checks {{actor._id}} ddchecks dd-checks">
                <button type="button" class="darkCheck rollable tableCheck {{actor._id}}" draggable="true" tableCheck="Critical Success Boon" data-table-check="Critical Success Boon">
                    <i class="fas fa-crown" inert></i>
                    <span>Critical Success</span>
                </button>
                <button type="button" class="darkCheck rollable tableCheck {{actor._id}}" draggable="true" tableCheck="Critical Failure Consequence" data-table-check="Critical Failure Consequence">
                    <i class="fas fa-exclamation-triangle" inert></i>
                    <span>Critical Failure</span>
                </button>
                <button type="button" class="darkCheck rollable tableCheck {{actor._id}}" draggable="true" tableCheck="Success at a Cost - Offerings" data-table-check="Success at a Cost - Offerings">
                    <i class="fas fa-balance-scale" inert></i>
                    <span>Success at a Cost</span>
                </button>
            </div>
        </section>
        {{/unless}}

        {{#if showTraining}}
        <section class="dd-card dd-card--training">
            <header class="dd-card-header">
                <i class="fas fa-dumbbell" inert></i>
                <h4 class="darksheetheader">Training</h4>
            </header>
            <div class="darksheet-training">
                <div class="darksheet-training__boxes">
                    {{#each training}}
                    <label class="darksheet-training__box" data-tooltip="Training {{this.n}}">
                        <input type="checkbox" name="flags.darksheet.training.box{{this.n}}" data-dtype="Boolean" {{checked this.checked}}>
                        <span>{{this.n}}</span>
                    </label>
                    {{/each}}
                </div>
            </div>
        </section>
        {{/if}}
    </div>
</section>
