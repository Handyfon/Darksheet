<div class="darksheet-spell-burnout">
    <header class="ds-burnout-header">
        <i class="fas fa-fire-flame-curved" inert></i>
        <h3>Spell Burnout</h3>
    </header>

    <div class="ds-burnout-row">
        <label class="ds-burnout-toggle">
            <input
                type="checkbox"
                class="ressourcecheckbox spellburn"
                name="flags.darksheet.attributes.autmomaticburnout"
                data-dtype="Boolean"
                title="Roll a burnout die automatically when casting a leveled spell"
                {{checked actor.flags.darksheet.attributes.autmomaticburnout}}
            >
            <span class="ds-burnout-toggle-track"><span class="ds-burnout-toggle-thumb"></span></span>
            <span class="ds-burnout-toggle-label">Auto-roll burnout</span>
        </label>

        <div class="ds-burnout-die">
            <span class="ds-burnout-die-label">Burnout Die</span>
            <button type="button" class="ds-burnout-roll burnoutclick burnoutdie rollable" title="Roll the burnout die">
                <i class="fas fa-dice-d20"></i>
                <span>Roll</span>
            </button>
            <select
                class="ds-burnout-die-select"
                name="flags.darksheet.attributes.burnout.value"
                data-type="String"
                value="actor.flags.darksheet.attributes.burnout.value">
                {{#select actor.flags.darksheet.attributes.burnout.value}}
                <option value="0">None</option>
                <option {{#if savecantrips}}disabled title="Disabled by the Save Cantrips variant rule"{{/if}} value="12">d12</option>
                <option value="10">d10</option>
                <option value="8">d8</option>
                <option value="6">d6</option>
                <option value="4">d4</option>
                {{/select}}
            </select>
        </div>

        <div class="ds-burnout-region">
            <span class="ds-burnout-region-label">Regional Magic</span>
            <select
                class="ds-burnout-region-select"
                name="flags.darksheet.attributes.regionmod.value"
                data-type="String"
                value="0"
                {{#if globalRegMagic}}disabled title="Locked by the Global Regional Magic setting"{{/if}}>
                {{#select actor.flags.darksheet.attributes.regionmod.value}}
                <option value="3">Serene +3</option>
                <option value="2">Calm +2</option>
                <option value="1">Stable +1</option>
                <option value="0">Normal</option>
                <option value="-1">Unstable -1</option>
                <option value="-2">Wild -2</option>
                <option value="-3">Chaotic -3</option>
                {{/select}}
            </select>
        </div>
    </div>
</div>
