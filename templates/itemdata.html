<section class="darksheet-item-data">
    <header class="darksheet-item-data__header">
        <i class="fas fa-skull" inert></i>
        <h3>Darker Dungeons</h3>
    </header>

    <div class="darksheetItemFormGroup darksheet-item-data__grid">
        <div class="form-group">
            <label class="darkItemLabel">Slots</label>
            <input type="number" step="any" name="flags.darksheet.item.slots" placeholder="0" value="{{item.flags.darksheet.item.slots}}" data-dType="Number" {{#if NotEditable}}disabled{{/if}}>
        </div>

        <div class="form-group">
            <label class="darkItemLabel">Notches</label>
            <input type="text" class="fatepoints" name="flags.darksheet.item.notches" value="{{item.flags.darksheet.item.notches}}" placeholder="0" data-dtype="Number" {{#if NotEditable}}disabled{{/if}}>
        </div>

        <div class="form-group">
            <label class="darkItemLabel">Quality</label>
            <select class="hitdice white" name="flags.darksheet.item.quality" data-dtype="String" {{#if NotEditable}}disabled{{/if}}>
                {{#select item.flags.darksheet.item.quality}}
                <option value="pristine">Pristine (75%)</option>
                <option value="worn">Worn (50%)</option>
                <option value="well-worn">Well-Worn (25%)</option>
                <option value="scarred">Scarred (10%)</option>
                {{/select}}
            </select>
        </div>

        <div class="form-group">
            <label class="tempercost">Temper</label>
            <select class="hitdice white" name="flags.darksheet.item.temper" data-dtype="String" {{#if NotEditable}}disabled{{/if}}>
                {{#select item.flags.darksheet.item.temper}}
                <option value=""></option>
                <option value="Pure" title="(Uncommon) Gains 1/2 (0.5) notch">Pure</option>
                <option value="Royal" title="(Rare) Gains 1/4 (0.25) notch">Royal</option>
                <option value="Astral" title="(Mythic) Gains 1/8 (0.125) notch">Astral</option>
                {{/select}}
            </select>
        </div>

        <div class="form-group">
            <label class="tempercost">Fragility</label>
            <select class="hitdice white" name="flags.darksheet.item.fragility" data-dtype="String" title="({{item.flags.darksheet.item.fragility}} Notches)" {{#if NotEditable}}disabled{{/if}}>
                {{#select item.flags.darksheet.item.fragility}}
                <option value=""></option>
                <option value="1" title="(1 Notch)">Delicate (1)</option>
                <option value="2" title="(2 Notches)">Frail (2)</option>
                <option value="3" title="(3 Notches)">Basic (3)</option>
                <option value="5" title="(5 Notches)">Solid (5)</option>
                <option value="10" title="(10 Notches)">Sturdy (10)</option>
                <option value="15" title="(15 Notches)">Durable (15)</option>
                <option value="20" title="(20 Notches)">Very Sturdy (20)</option>
                <option value="50" title="(50 Notches)">Fabled (50)</option>
                <option value="100" title="(100+ Notches)">Indestructible</option>
                {{/select}}
            </select>
        </div>

        <div class="form-group">
            <label class="ammodice">Ammodie</label>
            <select class="hitdice white" name="flags.darksheet.item.ammodie" placeholder="d20" data-dtype="String" {{#if NotEditable}}disabled{{/if}}>
                {{#select item.flags.darksheet.item.ammodie}}
                <option value=""></option>
                <option value="d20">d20</option>
                <option value="d12">d12</option>
                <option value="d10">d10</option>
                <option value="d8">d8</option>
                <option value="d6">d6</option>
                <option value="d4">d4</option>
                <option value="1">1</option>
                {{/select}}
            </select>
        </div>

        {{#if item.flags.darksheet.item.ammodie}}
        <div class="form-group darksheet-item-data__checkbox">
            <label class="ammodice">AutoRoll</label>
            <input name="flags.darksheet.item.autoRoll" type="checkbox" {{checked item.flags.darksheet.item.autoRoll}} {{#if NotEditable}}disabled{{/if}}>
        </div>
        {{/if}}

        {{#if item.flags.darksheet.item.basenotchdamage}}
        <div class="form-group">
            <label class="darkItemLabel">Notchdamage</label>
            <input type="number" step="any" name="flags.darksheet.item.basenotchdamage" placeholder="0" value="{{item.flags.darksheet.item.basenotchdamage}}" data-dType="Number" {{#if NotEditable}}disabled{{/if}}>
        </div>
        {{/if}}

        {{#if item.flags.darksheet.item.baseweapondamage.denomination}}
        <div class="form-group">
            <label class="darkItemLabel">Basedamage</label>
            <select class="hitdice white" name="flags.darksheet.item.baseweapondamage.denomination" placeholder="d20" data-dtype="Number" {{#if NotEditable}}disabled{{/if}}>
                {{#select item.flags.darksheet.item.baseweapondamage.denomination}}
                <option value=""></option>
                <option value="20">d20</option>
                <option value="12">d12</option>
                <option value="10">d10</option>
                <option value="8">d8</option>
                <option value="6">d6</option>
                <option value="5">d4</option>
                <option value="1">1</option>
                {{/select}}
            </select>
        </div>
        {{/if}}

        {{#if item.flags.darksheet.item.basearmor}}
        <div class="form-group">
            <label class="darkItemLabel">Basearmor</label>
            <input type="number" step="any" name="flags.darksheet.item.basearmor" placeholder="0" value="{{item.flags.darksheet.item.basearmor}}" data-dType="Number" {{#if NotEditable}}disabled{{/if}}>
        </div>
        {{/if}}
    </div>
</section>
